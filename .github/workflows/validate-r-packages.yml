name: Validate R Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R (latest)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Cache TinyTeX
        uses: actions/cache@v4
        with:
          path: ~/AppData/Roaming/TinyTeX
          key: tinytex-${{ runner.os }}

      - name: Setup TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install system dependencies
        shell: pwsh
        run: |
          $deps = Get-Content system-dependencies.txt | Where-Object { $_ -ne "" }
          foreach ($dep in $deps) {
            choco install $dep --yes --no-progress
          }

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-${{ hashFiles('r-packages.txt') }}
          restore-keys: r-pkgs-${{ runner.os }}-

      - name: Install pak, renv, and validation tooling
        shell: Rscript {0}
        run: |
          install.packages('pak', repos = 'https://cloud.r-project.org/')
          pak::pak('renv')
          pak::pak(c('rcmdcheck', 'covr', 'pharmaR/riskmetric', 'oysteR',
                     'rmarkdown', 'knitr', 'yaml', 'jsonlite'))

      - name: Install R packages from GitHub
        shell: Rscript {0}
        run: |
          packages <- readLines('r-packages.txt')
          packages <- packages[packages != '']
          for (pkg in packages) {
            message('Installing: ', pkg)
            pak::pak(pkg)
          }

      - name: Verify R packages load
        shell: Rscript {0}
        run: |
          packages <- readLines('r-packages.txt')
          packages <- packages[packages != '']
          for (pkg in packages) {
            pkg_name <- pak::pkg_deps(pkg, dependencies = FALSE)$package[1]
            message('Loading: ', pkg_name)
            library(pkg_name, character.only = TRUE)
            message(pkg_name, ' loaded successfully!')
          }
          message('All packages loaded successfully!')

      - name: Collect system info
        shell: Rscript {0}
        run: source("scripts/collect-system-info.R")

      - name: Classify packages
        shell: Rscript {0}
        run: source("scripts/classify-packages.R")

      - name: Validate packages (R CMD check + coverage)
        shell: Rscript {0}
        run: source("scripts/validate-packages.R")

      - name: Run riskmetric scoring
        shell: Rscript {0}
        run: source("scripts/run-riskmetric.R")

      - name: Scan vulnerabilities
        shell: Rscript {0}
        run: source("scripts/scan-vulnerabilities.R")

      - name: Assign validation levels
        shell: Rscript {0}
        run: source("scripts/assign-levels.R")

      - name: Capture session info
        shell: Rscript {0}
        run: |
          si <- sessionInfo()
          writeLines(capture.output(print(si)), "session-info.txt")
          message("Session info captured")

      - name: Generate validation report
        shell: Rscript {0}
        run: source("scripts/generate-report.R")

      - name: Create renv.lock
        shell: Rscript {0}
        run: |
          lib_path <- .libPaths()[1]
          installed_pkgs <- installed.packages(lib.loc = lib_path)[, 'Package']

          exclude_pkgs <- c('renv', 'pak', 'base', 'compiler', 'datasets', 'graphics',
                           'grDevices', 'grid', 'methods', 'parallel', 'splines',
                           'stats', 'stats4', 'tcltk', 'tools', 'translations', 'utils')
          pkgs_to_snapshot <- setdiff(installed_pkgs, exclude_pkgs)

          renv::snapshot(
            library = lib_path,
            packages = pkgs_to_snapshot,
            prompt = FALSE,
            force = TRUE
          )

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: |
            validation-report.html
            system-info.json
            package-classification.json
            validation-results.json
            riskmetric-results.json
            vulnerability-report.csv
            level-assignments.json
            session-info.txt
            renv.lock
