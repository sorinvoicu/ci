name: Create renv.lock (Windows)

on:
  workflow_dispatch:

jobs:
  create-renv-lock-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R (latest)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install system dependencies
        shell: pwsh
        run: |
          $deps = Get-Content system-dependencies.txt | Where-Object { $_ -ne "" }
          foreach ($dep in $deps) {
            choco install $dep --yes --no-progress
          }

      - name: Install pak and renv
        shell: Rscript {0}
        run: |
          install.packages('pak', repos = 'https://cloud.r-project.org/')
          pak::pak('renv')

      - name: Install R packages from GitHub
        shell: Rscript {0}
        run: |
          packages <- readLines('r-packages.txt')
          packages <- packages[packages != '']
          for (pkg in packages) {
            message('Installing: ', pkg)
            pak::pak(pkg)
          }

      - name: Verify R packages load
        shell: Rscript {0}
        run: |
          packages <- readLines('r-packages.txt')
          packages <- packages[packages != '']
          for (pkg in packages) {
            pkg_name <- pak::pkg_deps(pkg, dependencies = FALSE)$package[1]
            message('Loading: ', pkg_name)
            library(pkg_name, character.only = TRUE)
            message(pkg_name, ' loaded successfully!')
          }
          message('All packages loaded successfully!')

      - name: Assess R package risk with riskmetric
        shell: Rscript {0}
        run: |
          pak::pak("pharmaR/riskmetric")
          library(riskmetric)

          packages <- readLines("r-packages.txt")
          packages <- packages[packages != ""]

          pkg_names <- vapply(packages, function(pkg) {
            pak::pkg_deps(pkg, dependencies = FALSE)$package[1]
          }, character(1))

          results <- pkg_ref(pkg_names) |>
            pkg_assess() |>
            pkg_score()

          cat("\n=== riskmetric Risk Assessment ===\n")
          print(results[, c("package", "pkg_score")])

          summary_df <- data.frame(
            package   = results$package,
            risk_score = round(results$pkg_score, 4)
          )
          write.csv(summary_df, "riskmetric-report.csv", row.names = FALSE)
          message("Risk report saved to riskmetric-report.csv")

      - name: Upload riskmetric report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: riskmetric-report
          path: riskmetric-report.csv

      - name: Create renv.lock file
        shell: Rscript {0}
        run: |
          lib_path <- .libPaths()[1]
          installed_pkgs <- installed.packages(lib.loc = lib_path)[, 'Package']

          exclude_pkgs <- c('renv', 'pak', 'base', 'compiler', 'datasets', 'graphics',
                           'grDevices', 'grid', 'methods', 'parallel', 'splines',
                           'stats', 'stats4', 'tcltk', 'tools', 'translations', 'utils')
          pkgs_to_snapshot <- setdiff(installed_pkgs, exclude_pkgs)

          renv::snapshot(
            library = lib_path,
            packages = pkgs_to_snapshot,
            prompt = FALSE,
            force = TRUE
          )

      - name: Upload renv.lock as artifact
        uses: actions/upload-artifact@v4
        with:
          name: renv-lock-windows
          path: renv.lock
