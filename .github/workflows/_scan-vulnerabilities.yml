name: _Vulnerability Scan

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: false
  workflow_dispatch:

jobs:
  scan:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Setup R environment
        id: r-env
        uses: ./.github/actions/setup-r-environment

      - name: Install R packages from GitHub (cache miss)
        if: steps.r-env.outputs.cache-hit != 'true'
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        shell: Rscript {0}
        run: |
          if (!requireNamespace('remotes', quietly = TRUE)) install.packages('remotes')
          packages <- readLines('r-packages.txt')
          packages <- packages[packages != '']
          for (pkg in packages) {
            message('Installing: ', pkg)
            remotes::install_github(pkg, upgrade = 'never')
          }

      - name: Scan vulnerabilities
        shell: Rscript {0}
        run: source("scripts/scan-vulnerabilities.R")

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-artifacts
          path: vulnerability-report.csv
