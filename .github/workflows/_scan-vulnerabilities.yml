name: _Vulnerability Scan

on:
  workflow_call:
  workflow_dispatch:

jobs:
  scan:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R environment
        id: r-env
        uses: ./.github/actions/setup-r-environment

      - name: Assert R package cache hit
        if: steps.r-env.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "::error::R package cache was not found. Re-run the setup job or increment CACHE_VERSION in repo variables to rebuild."
          exit 1

      - name: Scan vulnerabilities
        shell: Rscript {0}
        run: source("scripts/scan-vulnerabilities.R")

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-artifacts
          path: vulnerability-report.csv
