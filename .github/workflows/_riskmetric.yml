name: _Riskmetric Scoring

on:
  workflow_call:
    inputs:
      target_packages:
        description: "Comma-separated package names to score. Empty = all packages."
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      target_packages:
        description: "Comma-separated package names to score. Empty = all packages."
        type: string
        required: false
        default: ""

jobs:
  riskmetric:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ github.token }}
      CACHE_VERSION: ${{ vars.CACHE_VERSION || 'v2' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R environment
        id: r-env
        uses: ./.github/actions/setup-r-environment

      - name: Assert R package cache hit
        if: steps.r-env.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "::error::R package cache was not found. Re-run the setup job or increment CACHE_VERSION in repo variables to rebuild."
          exit 1

      - name: Download setup artifacts
        uses: actions/download-artifact@v4
        with:
          name: setup-artifacts

      - name: Run riskmetric scoring
        env:
          TARGET_PACKAGES: ${{ inputs.target_packages }}
        shell: Rscript {0}
        run: source("scripts/run-riskmetric.R")

      - name: Upload riskmetric artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: riskmetric-artifacts
          path: riskmetric-results.json
