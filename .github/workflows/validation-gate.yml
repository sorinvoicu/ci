name: Validation Gate (PR)

on:
  pull_request:
    paths:
      - 'r-packages.txt'
      - 'validation-thresholds.yml'

jobs:
  validate-changes:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup R (latest)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install system dependencies
        shell: pwsh
        run: |
          $deps = Get-Content system-dependencies.txt | Where-Object { $_ -ne "" }
          foreach ($dep in $deps) {
            choco install $dep --yes --no-progress
          }

      - name: Install pak and validation tooling
        shell: Rscript {0}
        run: |
          install.packages('pak', repos = 'https://cloud.r-project.org/')
          pak::pak(c('rcmdcheck', 'covr', 'pharmaR/riskmetric', 'yaml', 'jsonlite'))

      - name: Detect changed packages
        id: detect-changes
        shell: bash
        run: |
          # Get the base branch version of r-packages.txt
          git show origin/${{ github.base_ref }}:r-packages.txt > /tmp/base-packages.txt 2>/dev/null || touch /tmp/base-packages.txt

          # Find added or changed lines
          added=$(comm -13 <(sort /tmp/base-packages.txt) <(sort r-packages.txt) | grep -v '^$' || true)
          removed=$(comm -23 <(sort /tmp/base-packages.txt) <(sort r-packages.txt) | grep -v '^$' || true)

          echo "Added/changed packages:"
          echo "$added"
          echo "Removed packages:"
          echo "$removed"

          # Write changed packages to file for R to read
          echo "$added" > /tmp/changed-packages.txt

          if [ -z "$added" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install all R packages (full environment)
        if: steps.detect-changes.outputs.has_changes == 'true'
        shell: Rscript {0}
        run: |
          packages <- readLines('r-packages.txt')
          packages <- packages[packages != '']
          for (pkg in packages) {
            message('Installing: ', pkg)
            pak::pak(pkg)
          }

      - name: Validate changed packages
        if: steps.detect-changes.outputs.has_changes == 'true'
        id: validate
        shell: Rscript {0}
        run: |
          library(jsonlite)
          library(rcmdcheck)
          library(covr)
          library(riskmetric)
          library(yaml)

          thresholds <- read_yaml("validation-thresholds.yml")

          changed <- readLines("/tmp/changed-packages.txt")
          changed <- changed[changed != ""]

          if (length(changed) == 0) {
            message("No changed packages to validate")
            writeLines("No changes detected.", "pr-summary.md")
            quit(save = "no", status = 0)
          }

          results <- list()
          has_errors <- FALSE

          for (pkg_ref in changed) {
            parts <- strsplit(pkg_ref, "@")[[1]]
            repo_path <- parts[1]
            tag <- if (length(parts) > 1) parts[2] else "HEAD"
            pkg_name <- pak::pkg_deps(pkg_ref, dependencies = FALSE)$package[1]

            message("\n=== Validating: ", pkg_name, " (", pkg_ref, ") ===")

            # Clone source
            clone_dir <- file.path(tempdir(), pkg_name)
            if (dir.exists(clone_dir)) unlink(clone_dir, recursive = TRUE)
            clone_url <- paste0("https://github.com/", repo_path, ".git")

            clone_ok <- tryCatch({
              system2("git", c("clone", "--depth", "1", "--branch", tag, clone_url, clone_dir),
                      stdout = TRUE, stderr = TRUE)
              TRUE
            }, error = function(e) FALSE)

            if (!clone_ok) {
              results[[pkg_name]] <- list(
                package = pkg_name, rcmdcheck = "CLONE_FAILED",
                coverage = NA, riskmetric = NA, level = "N/A"
              )
              next
            }

            # R CMD check
            check_status <- tryCatch({
              res <- rcmdcheck(clone_dir, args = c("--no-manual", "--no-build-vignettes"),
                               quiet = TRUE, error_on = "never")
              if (length(res$errors) > 0) { has_errors <- TRUE; "ERROR" }
              else if (length(res$warnings) > 0) "WARNING"
              else if (length(res$notes) > 0) "NOTE"
              else "PASS"
            }, error = function(e) { has_errors <<- TRUE; "ERROR" })

            # Coverage
            cov_pct <- tryCatch({
              cov <- package_coverage(clone_dir, quiet = TRUE)
              as.numeric(percent_coverage(cov))
            }, error = function(e) NA_real_)

            # Riskmetric
            risk_score <- tryCatch({
              scored <- pkg_ref(pkg_name) |> pkg_assess() |> pkg_score()
              scored$pkg_score[1]
            }, error = function(e) NA_real_)

            # Level assignment
            has_cov <- !is.na(cov_pct) && cov_pct >= thresholds$coverage_threshold
            has_risk <- !is.na(risk_score) && risk_score <= thresholds$riskmetric_threshold
            level <- if (has_cov && has_risk) 2L else 3L

            results[[pkg_name]] <- list(
              package = pkg_name,
              rcmdcheck = check_status,
              coverage = if (!is.na(cov_pct)) round(cov_pct, 1) else NA,
              riskmetric = if (!is.na(risk_score)) round(risk_score, 4) else NA,
              level = level
            )

            unlink(clone_dir, recursive = TRUE)
          }

          # Build summary markdown
          lines <- c("## Validation Gate Results", "",
                     "| Package | R CMD check | Coverage | Riskmetric | Level |",
                     "|---------|-------------|----------|------------|-------|")

          for (r in results) {
            cov_str <- if (is.na(r$coverage)) "N/A" else paste0(r$coverage, "%")
            risk_str <- if (is.na(r$riskmetric)) "N/A" else as.character(r$riskmetric)
            icon <- switch(r$rcmdcheck,
                           "PASS" = "\u2705", "WARNING" = "\u26a0\ufe0f",
                           "NOTE" = "\u2139\ufe0f", "\u274c")
            lines <- c(lines, sprintf("| %s | %s %s | %s | %s | %d |",
                                      r$package, icon, r$rcmdcheck, cov_str, risk_str, r$level))
          }

          if (has_errors) {
            lines <- c(lines, "", "\u274c **R CMD check errors detected — this gate will fail.**")
          }

          writeLines(lines, "pr-summary.md")
          write_json(results, "gate-results.json", pretty = TRUE, auto_unbox = TRUE)

          if (has_errors) {
            message("\nValidation gate FAILED: R CMD check errors detected")
            quit(save = "no", status = 1)
          }

      - name: Post PR comment
        if: always() && steps.detect-changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('pr-summary.md', 'utf8');
            } catch (e) {
              body = '## Validation Gate\n\nValidation could not complete. Check workflow logs for details.';
            }

            // Find and update existing comment or create new one
            const marker = '<!-- validation-gate-comment -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Upload gate artifacts
        if: always() && steps.detect-changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: validation-gate-results
          path: |
            pr-summary.md
            gate-results.json
