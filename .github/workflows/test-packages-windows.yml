name: Test R packages (Windows)

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

jobs:
  test-packages:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        shell: pwsh
        run: |
          $deps = Get-Content system-dependencies-windows.txt | Where-Object { $_ -ne "" }
          foreach ($dep in $deps) {
            choco install $dep --yes --no-progress
          }

      - name: Install pak
        shell: Rscript {0}
        run: |
          install.packages('pak', repos = 'https://cloud.r-project.org/')

      - name: Install R packages
        shell: Rscript {0}
        run: |
          packages <- readLines('r-packages.txt')
          packages <- packages[packages != '']
          for (pkg in packages) {
            pkg_release <- paste0(pkg, '@*release')
            message('Installing: ', pkg_release)
            pak::pak(pkg_release)
          }

      - name: Verify R packages load
        shell: Rscript {0}
        run: |
          packages <- readLines('r-packages.txt')
          packages <- packages[packages != '']
          for (pkg in packages) {
            pkg_name <- basename(pkg)
            message('Loading: ', pkg_name)
            library(pkg_name, character.only = TRUE)
            message(pkg_name, ' loaded successfully!')
          }
          message('All packages loaded successfully!')
