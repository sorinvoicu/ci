name: _Validate Package (R CMD check + coverage)

on:
  workflow_call:
    inputs:
      package_name:
        description: "Package name (e.g. rSharp)"
        type: string
        required: true
      package_ref:
        description: "GitHub ref (e.g. Open-Systems-Pharmacology/rSharp@v1.1.2)"
        type: string
        required: true
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name (e.g. rSharp)"
        type: string
        required: true
      package_ref:
        description: "GitHub ref (e.g. Open-Systems-Pharmacology/rSharp@v1.1.2)"
        type: string
        required: true

jobs:
  validate:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ github.token }}
      CACHE_VERSION: ${{ vars.CACHE_VERSION || 'v1' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R environment
        id: r-env
        uses: ./.github/actions/setup-r-environment

      - name: Assert R package cache hit
        if: steps.r-env.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "::error::R package cache was not found. Re-run the setup job or increment CACHE_VERSION in repo variables to rebuild."
          exit 1

      - name: Download setup artifacts
        uses: actions/download-artifact@v4
        with:
          name: setup-artifacts

      - name: Validate package
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          TARGET_PACKAGE: ${{ inputs.package_name }}
        shell: Rscript {0}
        run: source("scripts/validate-packages.R")

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-${{ inputs.package_name }}
          path: validation-${{ inputs.package_name }}.json
