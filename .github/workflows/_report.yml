name: _Report (assign levels + generate report + renv.lock)

on:
  workflow_call:
  workflow_dispatch:

jobs:
  report:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ github.token }}
      CACHE_VERSION: ${{ vars.CACHE_VERSION || 'v2' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R environment
        id: r-env
        uses: ./.github/actions/setup-r-environment

      - name: Setup TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Update TinyTeX and rebuild formats
        shell: pwsh
        run: |
          tlmgr update --self --all
          fmtutil-sys --all

      - name: Assert R package cache hit
        if: steps.r-env.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "::error::R package cache was not found. Re-run the setup job or increment CACHE_VERSION in repo variables to rebuild."
          exit 1

      - name: Download setup artifacts
        uses: actions/download-artifact@v4
        with:
          name: setup-artifacts

      - name: Download riskmetric artifacts
        uses: actions/download-artifact@v4
        with:
          name: riskmetric-artifacts

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          name: scan-artifacts

      - name: Download all per-package validation artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: validation-*
          merge-multiple: true

      - name: Merge per-package validation results
        shell: Rscript {0}
        run: |
          library(jsonlite)

          # Exclude validation-results.json itself — it matches the same pattern
          # and may already exist in the workspace from a previous run's artifact.
          val_files <- list.files(pattern = "^validation-.+\\.json$")
          val_files <- val_files[val_files != "validation-results.json"]
          message("Found ", length(val_files), " per-package validation file(s): ",
                  paste(val_files, collapse = ", "))

          if (length(val_files) == 0) {
            stop("No per-package validation artifacts found. Ensure the validate matrix jobs ran and uploaded their artifacts.")
          }

          all_results <- list()
          for (f in val_files) {
            pkg_results <- fromJSON(f, simplifyVector = FALSE)
            all_results <- c(all_results, pkg_results)
          }

          if (length(all_results) == 0) {
            stop("Per-package validation files were found but all are empty.")
          }

          writeBin(
            charToRaw(enc2utf8(as.character(toJSON(all_results, pretty = TRUE, auto_unbox = TRUE)))),
            "validation-results.json"
          )
          message("Merged ", length(all_results), " package(s) into validation-results.json")

      - name: Assign validation levels
        shell: Rscript {0}
        run: source("scripts/assign-levels.R")

      - name: Capture session info
        shell: Rscript {0}
        run: |
          si <- sessionInfo()
          writeLines(capture.output(print(si)), "session-info.txt")
          message("Session info captured")

      - name: Generate HTML validation report
        shell: Rscript {0}
        run: source("scripts/generate-report.R")

      - name: Generate PDF validation report
        shell: Rscript {0}
        run: source("scripts/generate-pdf-report.R")

      - name: Create renv.lock
        shell: Rscript {0}
        run: |
          lib_path <- .libPaths()[1]
          installed_pkgs <- installed.packages(lib.loc = lib_path)[, 'Package']

          exclude_pkgs <- c('renv', 'pak', 'base', 'compiler', 'datasets', 'graphics',
                           'grDevices', 'grid', 'methods', 'parallel', 'splines',
                           'stats', 'stats4', 'tcltk', 'tools', 'translations', 'utils')
          pkgs_to_snapshot <- setdiff(installed_pkgs, exclude_pkgs)

          renv::snapshot(
            library = lib_path,
            packages = pkgs_to_snapshot,
            prompt = FALSE,
            force = TRUE
          )

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-artifacts
          path: |
            validation-report.html
            validation-report.pdf
            system-info.json
            package-classification.json
            validation-results.json
            riskmetric-results.json
            vulnerability-report.csv
            level-assignments.json
            session-info.txt
            renv.lock

      - name: Delete intermediate artifacts
        if: success()
        shell: pwsh
        run: |
          $artifacts = (gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts?per_page=100" | ConvertFrom-Json).artifacts
          foreach ($artifact in $artifacts) {
            if ($artifact.name -ne "validation-artifacts") {
              Write-Host "Deleting artifact: $($artifact.name)"
              gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/$($artifact.id)"
            }
          }
