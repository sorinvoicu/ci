name: Setup R Environment
description: >
  Composite action: installs R, Pandoc, .NET, pak + validation tooling,
  and restores the R package cache. Cache SAVE is intentionally left to
  the _setup.yml workflow so only the authoritative installer writes it.

outputs:
  cache-hit:
    description: "Whether the R package cache was restored ('true' / 'false')"
    value: ${{ steps.r-cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup R (latest release)
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'

    - name: Setup Pandoc
      uses: r-lib/actions/setup-pandoc@v2

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install system dependencies
      shell: pwsh
      run: |
        $deps = Get-Content system-dependencies.txt | Where-Object { $_ -ne "" }
        foreach ($dep in $deps) {
          choco install $dep --yes --no-progress
        }

    - name: Restore R package cache
      id: r-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.R_LIBS_USER }}
        key: r-pkgs-${{ runner.os }}-${{ hashFiles('r-packages.txt') }}
        restore-keys: r-pkgs-${{ runner.os }}-

    - name: Install pak and validation tooling
      shell: Rscript {0}
      env:
        GITHUB_PAT: ${{ env.GITHUB_TOKEN }}
      run: |
        install.packages('pak', repos = 'https://cloud.r-project.org/')
        pak::pak(c(
          'rcmdcheck', 'covr', 'pharmaR/riskmetric', 'oysteR',
          'rmarkdown', 'knitr', 'yaml', 'jsonlite', 'remotes',
          'vdiffr', 'mockthat'
        ))
