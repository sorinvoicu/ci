repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: r-syntax
        name: R syntax check
        language: system
        entry: >-
          nix develop path:./tests --command Rscript --vanilla -e
          "for(f in commandArgs(TRUE)) tryCatch({
            if(grepl('[.]Rmd$',f,ignore.case=TRUE)){
              tmp<-tempfile(fileext='.R');
              knitr::purl(f,output=tmp,quiet=TRUE);
              parse(tmp)
            } else parse(f)
          }, error=function(e) stop(f, ': ', conditionMessage(e)))"
        files: \.(R|Rmd)$
